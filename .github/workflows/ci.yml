# SPDX-License-Identifier: Apache-2.0
# CI for the standalone repo (repo root = this package; the Go cross-verifier
# lives at ./scitt-cose-go-verify — see docs/launch-checklist.md for layout).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install
        run: pip install -e ".[dev,serve]"
      - name: Tests (Go cross-language check REQUIRED, never skipped)
        run: python -m pytest -q
        env:
          SCITT_REQUIRE_GO: "1"
      - name: Lint
        run: python -m ruff check .

  third-party-oracle:
    # The pycose oracle skips itself on cbor2>=6 (pycose 1.1 limitation). The
    # same no-silent-skip discipline as the Go check: this job pins cbor2<6 so
    # the third-party COSE cross-check actually runs on every push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with cbor2<6 (pycose-compatible)
        run: pip install -e ".[dev]" "cbor2<6"
      - name: pycose oracle must RUN (not skip)
        run: python -m pytest tests/test_thirdparty_cose.py -q -rs 2>&1 | tee out.txt && ! grep -q "skipped" out.txt

  go-verifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build + vet the independent Go verifier
        working-directory: scitt-cose-go-verify
        run: |
          go vet ./...
          go build ./...

  fuzz:
    # Bounded differential fuzz: seed from the v1 vectors, mutate, run every
    # mutant through BOTH verifiers (isolated subprocesses, timeout + mem cap)
    # and fail on any Python<->Go divergence NOT in tests/fuzz/baseline.json.
    # Minutes, not hours — a fixed seed + iteration budget keeps it deterministic.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install (runtime deps)
        run: pip install .
      - name: Build the Go verifier
        working-directory: scitt-cose-go-verify
        run: go build -o "$RUNNER_TEMP/gv" .
      - name: Differential fuzz (no divergence outside the known baseline)
        run: |
          python scripts/differential_fuzz.py \
            --go-binary "$RUNNER_TEMP/gv" \
            --iterations 600 --seed 20250612 \
            --write-findings "$RUNNER_TEMP/fuzz-findings"
      - name: Upload reproducing mutants (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-findings
          path: ${{ runner.temp }}/fuzz-findings
          if-no-files-found: ignore

  vectors:
    # The cross-implementation test-vector set, verified from a FRESH
    # environment by BOTH runtimes. Deliberately shares no caches with the
    # unit-test job: "reproducible from a clean checkout" is the claim under
    # test, so nothing here may reuse another job's state.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # no pip cache — fresh-environment reproducibility is the point
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - name: Published vector bytes are immutable (append-only promise, enforced)
        working-directory: test-vectors
        run: sha256sum -c SHA256SUMS
      - name: Install (runtime deps only — the vector path needs nothing else)
        run: pip install .
      - name: Python runner — full manifest, exit nonzero on any mismatch
        # Run from outside the checkout so the INSTALLED package is what runs
        # (from the repo root, the source tree would shadow site-packages and
        # a packaging regression could never be caught here).
        working-directory: ${{ runner.temp }}
        run: python -m scitt_cose.vectors "$GITHUB_WORKSPACE/test-vectors"
      - name: Go clean-room runner — same manifest, same files
        working-directory: scitt-cose-go-verify
        run: go test ./... -run TestVectors -v

  neutrality-gate:
    # The shipped tree must contain no downstream/reserved code references.
    # (The pytest suite enforces this for scitt_cose/; this job covers the
    # whole tree, including docs and the Go tool.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No downstream package references anywhere in the tree
        run: |
          # (pattern split so this workflow file doesn't match itself, in the
          # tree or in `git grep` over history — see the launch checklist)
          ! grep -rn "goph""er_ai" --include='*.py' --include='*.go' . || {
            echo "reserved/downstream code reference found"; exit 1; }
